<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portal Administrativo | Ativações</title>

  <style>
    :root {
      --bg-main: #f8fafc;
      --bg-header: #ff7a00;
      --bg-sidebar: #ffffff;
      --text-main: #1f2937;
      --text-muted: #6b7280;
      --blue: #0077c8;
      --orange: #ff7a00;
      --border: #e5e7eb;
      --success: #16a34a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg-main);
      color: var(--text-main);
    }

    /* HEADER */
    .header {
      height: 64px;
      background: var(--bg-header);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
      color: #ffffff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    .header-title {
      font-size: 20px;
      font-weight: bold;
    }

    .user-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #ffffff;
      color: var(--orange);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      cursor: pointer;
    }

    /* LAYOUT */
    .layout {
      display: flex;
      height: calc(100vh - 64px);
    }

    /* SIDEBAR */
    .sidebar {
      width: 240px;
      background: var(--bg-sidebar);
      padding: 30px 20px;
      border-right: 1px solid var(--border);
    }

    .sidebar h2 {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 25px;
      text-transform: uppercase;
    }

    .menu a {
      display: block;
      text-decoration: none;
      color: var(--text-muted);
      padding: 14px 12px;
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 15px;
    }

    .menu a.active {
      background: #fff4ec;
      color: var(--orange);
      font-weight: bold;
      border-left: 4px solid var(--orange);
    }

    .menu a:hover {
      background: #f3f4f6;
      color: var(--text-main);
    }

    /* CONTEÚDO */
    .content {
      flex: 1;
      padding: 30px 40px;
      overflow: auto;
    }

    /* TÍTULO + FILTROS */
    .content-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }

    .content-header h1 {
      font-size: 28px;
      color: var(--blue);
      margin: 0;
    }

    .filters {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .filters input {
      padding: 8px 10px;
      font-size: 13px;
      border: 1px solid var(--border);
      border-radius: 4px;
      min-width: 150px;
    }

    .filters button {
      background: var(--orange);
      color: #ffffff;
      border: none;
      padding: 9px 16px;
      font-size: 13px;
      border-radius: 4px;
      cursor: pointer;
    }

    .filters button:hover {
      opacity: 0.9;
    }

    /* TABELA */
    table {
      width: 100%;
      border-collapse: collapse;
      background: #ffffff;
    }

    thead th {
      text-align: left;
      font-size: 14px;
      color: var(--blue);
      padding-bottom: 14px;
      border-bottom: 2px solid var(--border);
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
    }

    tbody td {
      padding: 16px 0;
      font-size: 14px;
    }

    .status {
      color: var(--success);
      font-weight: bold;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <div class="header-title">Portal Administrativo</div>
    <div class="user-icon">U</div>
  </div>

  <!-- LAYOUT -->
  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <h2>Menu</h2>

      <div class="menu">
        <a href="ativacoes.html" class="active">Ativações</a>
        <a href="transacoes.html">Transações</a>
      </div>
    </aside>

    <!-- CONTEÚDO -->
    <main class="content">

      <!-- TÍTULO + FILTROS -->
      <div class="content-header">
        <h1>Ativações</h1>

        <div class="filters">
          <input type="date" placeholder="Data Inicial" />
          <input type="date" placeholder="Data Final" />
          <input type="text" placeholder="Placa" />
          <input type="text" placeholder="Número de Série" />
          <input type="text" placeholder="Código Interno Parceiro" />
          <button>Filtrar</button>
        </div>
      </div>

      <!-- TABELA -->
      <table>
        <thead>
          <tr>
            <th>Código Interno Parceiro</th>
            <th>Placa</th>
            <th>Número de Série</th>
            <th>Status</th>
            <th>Data Ativação</th>
            <th>Data Cancelamento</th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <td>CP-984512</td>
            <td>ABC1D23</td>
            <td>SN-2025-88412</td>
            <td class="status">Ativo</td>
            <td>12/03/2026</td>
            <td>—</td>
          </tr>

          <tr>
            <td>CP-984890</td>
            <td>DEF4G56</td>
            <td>SN-2025-99231</td>
            <td class="status">Ativo</td>
            <td>25/03/2026</td>
            <td>—</td>
          </tr>
        </tbody>
      </table>

    </main>

  </div>

</body>
</html>
